<!DOCTYPE html>

  <link rel="stylesheet" href="../styles.css">
  <style>
    .thanks-wrap {
      min-height: calc(100vh - 84px);
      display: grid;
      place-items: center;
      padding: 48px 16px;
      background: var(--bg-alt);
    }
    .thanks-card {
      background: #fff;

      max-width: 560px;
      padding: 48px 36px;
      text-align: center;
    }
    .thanks-icon {
      width: 88px; height: 88px;
      margin: 0 auto 20px;
      display: grid; place-items: center;
      font-size: 2.6rem;
      background: linear-gradient(135deg, #eaf2fe, #d8e8fd);
      color: var(--blue);
      border-radius: 50%;
    }
    .thanks-title {
      font-family: var(--head);
      font-weight: 900;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      color: var(--navy);
      margin-bottom: 14px;
    }
    .thanks-text {
      color: var(--muted);
      font-size: 1.08rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .thanks-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
